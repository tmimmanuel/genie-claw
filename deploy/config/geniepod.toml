# GeniePod system configuration
# Installed to /etc/geniepod/geniepod.toml

data_dir = "/opt/geniepod/data"

[core]
port = 3000
bind_host = "127.0.0.1"           # Safer default. Use "0.0.0.0" only behind a trusted gateway/firewall.
ha_token = ""                     # Only needed when Home Assistant service is enabled below. Or set HA_TOKEN env var.
llm_model_name = "phi"            # For prompt optimization. Options: nemotron-4b, tinyllama, llama, qwen, phi
whisper_model = "/opt/geniepod/models/ggml-small.bin"
whisper_port = 0                  # 0 = CLI mode; set to 8178 for server mode.
whisper_cli_path = "/opt/geniepod/bin/whisper-cli"
stt_language = "auto"             # "auto" or a language code like "en", "es", "de", "zh".
piper_model = "/opt/geniepod/voices/en_US-amy-medium.onnx"
piper_path = "/opt/geniepod/piper/piper"
piper_pipe_mode = false           # true = long-running subprocess (lower latency).
max_history_turns = 20
expected_runtime_contract_hash = ""  # Optional: pin after a known-good boot to detect prompt/tool/policy drift.
audio_device = "auto"             # Auto-detect: prefers Tegra APE (LyraT/I2S2) if routed,
                                  # falls back to USB audio, then card 0. Override examples:
                                  #   "plughw:APE,0"  — LyraT/I2S2 (see doc/lyrat-jetson-audio.md)
                                  #   "plughw:0,0"   — first card
                                  #   "plughw:2,0"   — explicit USB card index
audio_sample_rate = 48000         # USB headphone native sample rate. LyraT outputs 48 kHz,
                                  # ALSA plughw downmixes/resamples to whatever record_audio asks.
voice_enabled = false             # Set true or use --voice flag to enable voice mode.
voice_record_secs = 5             # Seconds to record per voice interaction.
voice_continuous = true           # After response, auto-listen for follow-up without re-wake.
voice_continuous_secs = 3         # Shorter recording for follow-up conversation.
llm_model_path = "/opt/geniepod/models/phi-4-mini-instruct-q4_k_m.gguf"  # For GPU time-sharing in voice mode.
wakeword_script = "/opt/geniepod/bin/genie-wake-listen.py"   # Wake word listener (empty = push-to-talk).

# Optional per-language Piper voices for multilingual speech output:
# [core.voice_tts_models]
# es = "/opt/geniepod/voices/es_ES-sharvard-medium.onnx"
# de = "/opt/geniepod/voices/de_DE-thorsten-medium.onnx"
# zh = "/opt/geniepod/voices/zh_CN-huayan-medium.onnx"

# Optional speaker-identity provider for voice memory context:
# [core.speaker_identity]
# enabled = true
# provider = "local_biometric"   # "none", "fixed", or "local_biometric"
# fixed_name = "Jared"
# fixed_confidence = "high"      # "low", "medium", or "high"
# local_profile_dir = "/opt/geniepod/data/speakers"
# local_min_score = 0.82
# Enroll with: genie-ctl speaker enroll-live Jared

# Runtime load policy for native skills. Defaults are audit-only so existing
# local skills keep loading; enable these after manifests/signatures are ready.
# [core.skill_policy]
# require_manifest = false
# require_signature = false
# denied_permissions = ["network.raw", "filesystem.write"]

# Optional per-origin tool policy. Defaults are allow unless a rule exists.
# Use "*" as a wildcard origin or tool name. Deny rules override allow rules.
# [core.tool_policy]
# enabled = true
# allowed_tools_by_origin = { voice = ["get_time", "get_weather", "memory_recall", "home_status", "home_control"] }
# denied_tools_by_origin = { telegram = ["play_media"], "*" = [] }

# Final actuation safety gate for physical home-control execution:
# [core.actuation_safety]
# enabled = true
# min_target_confidence = 0.78
# min_sensitive_confidence = 0.90
# deny_multi_target_sensitive = true
# require_available_state = true
# allowed_origins = ["voice", "dashboard", "api", "telegram", "repl", "confirmation"]
# max_actions_per_minute = 12
# max_actions_per_minute_by_origin = { telegram = 3, voice = 8 }

[governor]
poll_interval_ms = 5000
night_start_hour = 23
day_start_hour = 6
night_model_swap = false     # Set true to enable 9B model at night (opt-in).

[governor.pressure]
stop_optins_mb = 500         # Stop Nextcloud/Jellyfin below this.
reduce_context_mb = 300      # Reduce LLM context under memory pressure.
swap_stt_mb = 200            # Downgrade to Whisper tiny.
zram_mb = 100                # Enable 2 GB zram swap (last resort).

[health]
interval_secs = 30
alert_enabled = false
alert_webhook_url = ""            # Optional local notifier endpoint.

# Uncomment to enable Telegram long-poll chat integration:
# [telegram]
# enabled = true
# bot_token = ""                   # Or set TELEGRAM_BOT_TOKEN env var.
# api_base = "https://api.telegram.org"
# poll_timeout_secs = 30
# allowed_chat_ids = [123456789]   # Recommended allowlist for private use.
# allow_all_chats = false

# Public web search tool. Default provider is DuckDuckGo Instant Answer, which needs no API key.
# For a private/local path, run SearXNG and set provider = "searxng" with base_url.
[web_search]
enabled = true
provider = "duckduckgo"          # "duckduckgo" or "searxng"
base_url = ""                    # Example for SearXNG: "http://127.0.0.1:8888"
allow_remote_base_url = false    # Keep SearXNG local unless explicitly changed.
timeout_secs = 8
max_results = 3
cache_enabled = true
cache_ttl_secs = 900
cache_max_entries = 64

# Uncomment to enable an ESP32-C6 UART Thread/Matter sidecar for GenieClaw-local diagnostics or control:
# [connectivity]
# enabled = true
# transport = "esp32c6_uart"
# device = "esp32c6"
#
# [connectivity.esp32c6_uart]
# device_path = "/dev/ttyTHS1"     # Use /dev/ttyACM0 or /dev/ttyUSB0 for many dev boards.
# baud_rate = 115200
# reset_gpio = 24
# hardware_flow_control = false
# mtu_bytes = 1024
# response_timeout_ms = 250

[services.core]
url = "http://127.0.0.1:3000/api/health"
systemd_unit = "genie-core.service"

[services.llm]
url = "http://127.0.0.1:8080/health"
systemd_unit = "genie-llm.service"

# Uncomment to enable Home Assistant integration:
# [services.homeassistant]
# url = "http://127.0.0.1:8123/"
# systemd_unit = "homeassistant.service"

# Uncomment after enabling via first-boot wizard:
# [services.nextcloud]
# url = "http://127.0.0.1:8180/status.php"
# systemd_unit = "nextcloud.service"

# [services.jellyfin]
